<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="cal_sp.css">
<style>
body{margin:0;padding:12px;background:#fff;font-family:Meiryo, sans-serif;color:#222}
.calLead{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin:0 0 8px}
.calLead h3{margin:0;font-size:14px;font-weight:700}
.legend{display:flex;gap:12px;font-size:12px}
.legend span{display:inline-flex;align-items:center;gap:6px}
.legend i{display:inline-block;width:10px;height:10px}
.legend .open{background:#000}
.legend .holiday{background:#d00}
.note{margin:8px 0 0;font-size:12px}
</style>
</head>
<body>
  <div class="calLead">
    <h3>営業カレンダー</h3>
    <div class="legend">
      <span><i class="open"></i>営業日</span>
      <span><i class="holiday"></i>休日</span>
    </div>
  </div>
  <script src="cal.js" charset="UTF-8"></script>
  <p class="note">※休日でもお買い物は可能です</p>
</body>
</html>
